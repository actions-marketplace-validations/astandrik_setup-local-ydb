name: Feature request
description: Suggest an improvement for setup-local-ydb.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: CI problem
      description: What GitHub Actions workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the input, output, or workflow behavior you want.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example workflow
      render: yaml
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
