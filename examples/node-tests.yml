name: node tests with local YDB

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Start local YDB
        uses: astandrik/setup-local-ydb@v1
        with:
          version: 26.1.1.6
          tenant: /local/test

      - name: Run integration tests
        run: |
          export YDB_ENDPOINT="${LOCAL_YDB_ENDPOINT}"
          export YDB_DATABASE="${LOCAL_YDB_DATABASE}"
          npm test
